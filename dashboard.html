<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHTOOL ADMIN | Order Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #05070a; color: white; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-blue { color: #3b82f6; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .status-pending { color: #facc15; background: rgba(250, 204, 21, 0.1); }
        .status-completed { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        table { border-collapse: separate; border-spacing: 0 10px; }
        tr { transition: 0.3s; }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-12 border-b border-gray-900 pb-8">
        <div>
            <h1 class="text-3xl font-black font-orbitron neon-blue italic uppercase tracking-tighter">SHTOOL ADMIN</h1>
            <p class="text-[9px] text-gray-500 tracking-[0.4em] uppercase mt-1">Authorized Command Center</p>
        </div>
        <div class="flex gap-4">
            <div class="glass-card px-6 py-2 rounded-xl text-center border border-blue-500/20">
                <span class="block text-[8px] text-gray-500 uppercase font-bold">Total Orders</span>
                <span id="totalCount" class="text-lg font-black font-orbitron">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="glass-card rounded-[2rem] overflow-hidden border border-gray-800">
            <table class="w-full text-left">
                <thead class="bg-white/5 uppercase text-[10px] font-black tracking-widest text-gray-500">
                    <tr>
                        <th class="p-6">Date</th>
                        <th class="p-6">Service</th>
                        <th class="p-6">IMEI / Serial</th>
                        <th class="p-6">Price</th>
                        <th class="p-6">Status</th>
                        <th class="p-6 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody" class="text-xs">
                    </tbody>
            </table>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center text-[9px] text-gray-700 uppercase tracking-[0.5em]">
        GSM SHTOOL SECURE ADMIN PANEL v2.0
    </footer>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { 
            projectId: "gsm-icloud-site", 
            appId: "1:722465166110:web:2924065072d54e3cf06f0f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LOAD ORDERS REAL-TIME
        db.collection("orders").orderBy("date", "desc").onSnapshot((snapshot) => {
            const tableBody = document.getElementById('ordersTableBody');
            const totalCount = document.getElementById('totalCount');
            tableBody.innerHTML = '';
            totalCount.innerText = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id;
                
                const statusClass = data.status === 'Completed' ? 'status-completed' : 'status-pending';

                tableBody.innerHTML += `
                    <tr class="border-b border-gray-900/50">
                        <td class="p-6 text-gray-500 font-mono">${data.date || 'N/A'}</td>
                        <td class="p-6 font-bold text-blue-200">${data.service_name || 'Service'}</td>
                        <td class="p-6 font-mono font-black text-white tracking-tighter">${data.imei}</td>
                        <td class="p-6 text-green-400 font-black font-orbitron">$${data.service_price}</td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${statusClass}">
                                ${data.status}
                            </span>
                        </td>
                        <td class="p-6 text-center">
                            <div class="flex justify-center gap-2">
                                <button onclick="markAsCompleted('${id}')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg text-[9px] font-black uppercase transition">Done</button>
                                <button onclick="deleteOrder('${id}')" class="bg-red-900/20 text-red-500 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase transition">Del</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        });

        // ACTION: MARK COMPLETED
        async function markAsCompleted(id) {
            if(confirm("Confirm this order as COMPLETED?")) {
                try {
                    await db.collection("orders").doc(id).update({ status: "Completed" });
                } catch (e) {
                    alert("Error: " + e.message);
                }
            }
        }

        // ACTION: DELETE ORDER
        async function deleteOrder(id) {
            if(confirm("Are you sure you want to PERMANENTLY DELETE this order?")) {
                try {
                    await db.collection("orders").doc(id).delete();
                } catch (e) {
                    alert("Error: " + e.message);
                }
            }
        }
    </script>
</body>
</html>
