<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM SHTOOL | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#05070a] text-white p-10">
    <h2 class="text-2xl font-black mb-10 text-blue-500 font-orbitron uppercase border-b border-gray-900 pb-4">Incoming Orders</h2>
    <div class="overflow-hidden rounded-2xl border border-gray-800">
        <table class="w-full text-left bg-gray-900/20">
            <thead class="bg-blue-900/10 text-blue-400 text-xs uppercase font-bold">
                <tr>
                    <th class="p-5">Date</th>
                    <th class="p-5">IMEI</th>
                    <th class="p-5">Amount</th>
                    <th class="p-5">Status</th>
                </tr>
            </thead>
            <tbody id="ordersList" class="text-sm font-light"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("orders").orderBy("date", "desc").onSnapshot(snap => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<tr class="border-b border-gray-800 hover:bg-white/5 transition">
                    <td class="p-5 text-gray-500">${d.date}</td>
                    <td class="p-5 font-mono text-blue-300 uppercase">${d.imei}</td>
                    <td class="p-5 font-bold text-green-400">$${d.service_price}</td>
                    <td class="p-5"><span class="px-3 py-1 bg-yellow-900/20 text-yellow-500 rounded text-[10px] font-bold uppercase">${d.status}</span></td>
                </tr>`;
            });
        });
    </script>
</body>
</html>
