<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | GSM SHTOOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#05070a] text-white p-6 md:p-12">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-900 pb-6">
            <div>
                <h1 style="font-family: 'Orbitron';" class="text-2xl font-black text-blue-500 italic tracking-tighter">SHTOOL ADMIN</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Authorized Access Only</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 text-center min-w-[100px]">
                    <span id="totalCount" class="block text-xl font-black">0</span>
                    <span class="text-[8px] text-gray-500 uppercase">Total Orders</span>
                </div>
            </div>
        </header>

        <div class="overflow-hidden rounded-3xl border border-gray-900 bg-gray-900/10">
            <table class="w-full text-left">
                <thead class="bg-blue-900/20 text-[10px] uppercase tracking-widest font-bold text-blue-400">
                    <tr>
                        <th class="p-6">Date / Time</th>
                        <th class="p-6">Device IMEI</th>
                        <th class="p-6">Price</th>
                        <th class="p-6">Status</th>
                        <th class="p-6 text-center">Operation</th>
                    </tr>
                </thead>
                <tbody id="ordersBody" class="text-sm divide-y divide-gray-900">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site", appId: "1:722465166110:web:2924065072d54e3cf06f0f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("orders").orderBy("date", "desc").onSnapshot(snap => {
            const body = document.getElementById('ordersBody');
            document.getElementById('totalCount').innerText = snap.size;
            body.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                body.innerHTML += `
                    <tr class="hover:bg-white/5 transition">
                        <td class="p-6 text-gray-500 text-xs">${d.date}</td>
                        <td class="p-6 font-mono font-bold text-blue-200">${d.imei}</td>
                        <td class="p-6 font-black text-green-500">$${d.service_price}</td>
                        <td class="p-6">
                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${d.status === 'Completed' ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-yellow-500'}">
                                ${d.status}
                            </span>
                        </td>
                        <td class="p-6 text-center space-x-2 flex justify-center">
                            <button onclick="update('${id}', 'Completed')" class="bg-green-600 hover:bg-green-500 px-4 py-1 rounded text-[10px] font-black uppercase tracking-widest">Done</button>
                            <button onclick="remove('${id}')" class="bg-red-900/30 text-red-500 hover:bg-red-600 hover:text-white px-4 py-1 rounded text-[10px] font-black uppercase tracking-widest">Del</button>
                        </td>
                    </tr>
                `;
            });
        });

        function update(id, st) { db.collection("orders").doc(id).update({ status: st }); }
        function remove(id) { if(confirm("Delete Permanently?")) db.collection("orders").doc(id).delete(); }
    </script>
</body>
</html>
