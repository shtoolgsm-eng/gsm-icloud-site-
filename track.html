<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order | iRemove Tool VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #030508; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full glass-card p-12 rounded-[3rem] text-center">
        <h2 style="font-family: 'Orbitron';" class="text-2xl font-black text-blue-500 mb-10 italic uppercase tracking-tighter">Track Status</h2>
        
        <input id="trackImei" type="text" placeholder="ENTER IMEI / SERIAL" class="w-full p-5 bg-black border border-gray-800 rounded-2xl mb-8 text-center font-mono focus:border-blue-500 outline-none uppercase transition">
        
        <button onclick="checkStatus()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-500/20">Verify Identity</button>
        
        <div id="statusResult" class="mt-12 hidden">
            <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
                <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest block mb-3">Live Order Status</span>
                <span id="statusLabel" class="text-2xl font-black font-orbitron uppercase italic"></span>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site", appId: "1:722465166110:web:2924065072d54e3cf06f0f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function checkStatus() {
            const imei = document.getElementById('trackImei').value.trim();
            const resDiv = document.getElementById('statusResult');
            const label = document.getElementById('statusLabel');

            if(!imei) return alert("Please enter IMEI");

            const q = await db.collection("orders").where("imei", "==", imei).get();
            resDiv.classList.remove('hidden');

            if (q.empty) {
                label.innerText = "NOT FOUND";
                label.className = "text-2xl font-black font-orbitron text-red-500";
            } else {
                const data = q.docs[0].data();
                label.innerText = data.status;
                label.className = data.status === "Completed" ? "text-2xl font-black font-orbitron text-green-400" : "text-2xl font-black font-orbitron text-yellow-400";
            }
        }
    </script>
</body>
</html>
