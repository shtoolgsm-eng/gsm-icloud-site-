<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM SHTOOL | Order Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#05070a] text-white p-6">
    <div class="max-w-3xl mx-auto bg-gray-900/40 p-10 rounded-3xl border border-gray-800 shadow-2xl">
        <h2 class="text-3xl font-black mb-10 text-center text-blue-500 font-orbitron italic uppercase">Select Service</h2>
        <form id="orderForm">
            <div class="mb-8">
                <label class="block text-gray-500 text-xs font-bold uppercase mb-3 tracking-widest">Device Category</label>
                <select id="serviceSelect" class="w-full p-4 bg-black border border-gray-800 rounded-2xl text-sm focus:border-blue-500 outline-none appearance-none" required>
                    <option value="" disabled selected>-- CHOOSE MODEL --</option>
                    <optgroup label="⚡ BYPASS SPECIAL (OFFER)">
                        <option value="10">iCloud Bypass (All Models - No Network) - $10</option>
                    </optgroup>
                    <optgroup label="📱 IPHONE OFFICIAL UNLOCK (OOF)">
                        <option value="25">iPhone 6 / 6S Series - $25</option>
                        <option value="30">iPhone SE / 7 / 7 Plus - $30</option>
                        <option value="35">iPhone 8 / 8 Plus / X - $35</option>
                        <option value="40">iPhone XR / XS - $40</option>
                        <option value="45">iPhone XS Max / 11 - $45</option>
                        <option value="55">iPhone 11 Pro - $55</option>
                        <option value="75">iPhone 11 Pro Max - $75</option>
                        <option value="90">iPhone 12 / 12 mini - $90</option>
                        <option value="95">iPhone 12 Pro - $95</option>
                        <option value="100">iPhone 12 Pro Max - $100</option>
                        <option value="115">iPhone 13 / 13 mini - $115</option>
                        <option value="135">iPhone 13 Pro - $135</option>
                        <option value="150">iPhone 13 Pro Max - $150</option>
                        <option value="160">iPhone 14 / 14 Plus - $160</option>
                        <option value="165">iPhone 14 Pro / 15 - $165</option>
                        <option value="175">iPhone 14 Pro Max / 15 Plus - $175</option>
                        <option value="180">iPhone 15 Pro - $180</option>
                        <option value="190">iPhone 15 Pro Max / 16 - $190</option>
                        <option value="195">iPhone 16 Plus/Pro / 17 Series - $195</option>
                        <option value="205">iPhone 16 Pro Max - $205</option>
                        <option value="210">iPhone 17 Pro Max - $210</option>
                    </optgroup>
                    <optgroup label="💻 IPAD SERIES">
                        <option value="50">iPad 8 - $50</option>
                        <option value="55">iPad 9 - $55</option>
                        <option value="65">iPad 10 - $65</option>
                        <option value="140">iPad Pro 11 (1-4) - $140</option>
                        <option value="150">iPad Pro 12.9 (1-6) - $150</option>
                    </optgroup>
                    <optgroup label="⌚ APPLE WATCH">
                        <option value="60">Series 4 - $60</option>
                        <option value="85">Series 10 / 11 - $85</option>
                        <option value="120">Ultra 2 / 3 - $120</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="mb-10">
                <label class="block text-gray-500 text-xs font-bold uppercase mb-3 tracking-widest">Device Serial / IMEI</label>
                <input type="text" id="imeiInput" placeholder="ENTER 15 DIGITS" class="w-full p-4 bg-black border border-gray-800 rounded-2xl text-sm focus:border-blue-500 outline-none uppercase font-mono">
            </div>

            <button type="button" onclick="submitOrder()" class="w-full py-5 bg-blue-600 rounded-2xl font-black uppercase tracking-widest text-sm shadow-lg shadow-blue-900/40">Confirm Order</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            projectId: "gsm-icloud-site",
            appId: "1:722465166110:web:2924065072d54e3cf06f0f" //
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function submitOrder() {
            const service = document.getElementById('serviceSelect').value;
            const imei = document.getElementById('imeiInput').value;
            if(!imei) return alert("Please enter IMEI");

            db.collection("orders").add({
                service_price: service,
                imei: imei,
                status: "Pending",
                date: new Date().toLocaleString()
            }).then(() => {
                alert("Order Sent! Redirecting to Payment...");
                window.location.href = "checkout.html";
            });
        }
    </script>
</body>
</html>
