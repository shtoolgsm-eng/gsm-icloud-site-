<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iRemove VIP | ADMIN PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#020406] text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-black mb-10 text-blue-500 font-orbitron italic">VIP COMMAND CENTER</h1>
        <div class="overflow-hidden rounded-2xl border border-gray-800 bg-gray-900/20">
            <table class="w-full text-left border-collapse">
                <thead class="bg-white/5 text-[10px] uppercase font-black text-gray-500">
                    <tr>
                        <th class="p-5">Service</th>
                        <th class="p-5">IMEI</th>
                        <th class="p-5">Status</th>
                        <th class="p-5">Action</th>
                    </tr>
                </thead>
                <tbody id="adminBody" class="text-xs"></tbody>
            </table>
        </div>
    </div>
    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site", appId: "1:722465166110:web:2924065072d54e3cf06f0f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("orders").onSnapshot(s => {
            const b = document.getElementById('adminBody'); b.innerHTML = '';
            s.forEach(doc => {
                const d = doc.data();
                b.innerHTML += `
                <tr class="border-b border-gray-800">
                    <td class="p-5">${d.service_name}</td>
                    <td class="p-5 font-mono text-blue-400">${d.imei}</td>
                    <td class="p-5 font-bold">${d.status}</td>
                    <td class="p-5 space-x-2">
                        <button onclick="upd('${doc.id}')" class="bg-green-600 px-3 py-1 rounded font-bold">DONE</button>
                        <button onclick="del('${doc.id}')" class="bg-red-600 px-3 py-1 rounded font-bold">DEL</button>
                    </td>
                </tr>`;
            });
        });
        function upd(id) { db.collection("orders").doc(id).update({status: "Completed"}); }
        function del(id) { if(confirm("Delete?")) db.collection("orders").doc(id).delete(); }
    </script>
</body>
</html>
