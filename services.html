<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRemove Tool VIP | Premium Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #020406; color: white; font-family: 'Inter', sans-serif; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-premium { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; }
        .blue-glow-btn { background: linear-gradient(45deg, #1e40af, #3b82f6); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .blue-glow-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        select { background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; appearance: none; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-3xl font-black font-orbitron italic text-blue-500 uppercase tracking-tighter">iRemove <span class="text-white">VIP Services</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.5em] mt-3">Advanced Forensic & Unlock Hub</p>
        </header>

        <div class="glass-premium p-8 md:p-12 rounded-[3rem]">
            <div class="space-y-10">
                <div>
                    <label class="block text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest ml-2">1. Select VIP Service</label>
                    <select id="serviceSelect" class="w-full p-6 bg-black border border-gray-800 rounded-2xl text-sm font-semibold focus:border-blue-500 outline-none transition">
                        <option value="" disabled selected>-- ACCESS GLOBAL CATALOG --</option>
                        <optgroup label="⚡ SPECIAL BYPASS (INSTANT)">
                            <option value="10">iCloud Bypass (No Network) - $10</option>
                            <option value="13">iCloud Bypass (6-17PM FULL) - $13</option>
                        </optgroup>
                        <optgroup label="📱 IPHONE OFFICIAL (LOST/CLEAN)">
                            <option value="35">iPhone 6 / 6S Series - $35</option>
                            <option value="45">iPhone 8 / X Series - $45</option>
                            <option value="55">iPhone 11 Pro - $75</option>
                            <option value="100">iPhone 12 Pro Max - $100</option>
                            <option value="150">iPhone 13 Pro Max - $150</option>
                            <option value="180">iPhone 15 Pro - $180</option>
                            <option value="205">iPhone 16 Pro Max - $205</option>
                            <option value="210">iPhone 17 Pro Max - $210</option>
                        </optgroup>
                        <optgroup label="⌚ APPLE WATCH / IPAD">
                            <option value="120">Watch Ultra 1/2/3 - $120</option>
                            <option value="150">iPad Pro 12.9 (All Gen) - $150</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest ml-2">2. Device IMEI / Serial</label>
                    <input type="text" id="imeiInput" placeholder="ENTER 15 DIGITS" class="w-full p-6 bg-black border border-gray-800 rounded-2xl text-sm font-mono focus:border-blue-500 outline-none uppercase tracking-[0.2em]">
                </div>

                <button onclick="submitOrder()" class="w-full py-6 blue-glow-btn rounded-2xl font-black font-orbitron uppercase tracking-widest text-sm transition">Execute Order</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site", appId: "1:722465166110:web:2924065072d54e3cf06f0f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function submitOrder() {
            const service = document.getElementById('serviceSelect');
            const imei = document.getElementById('imeiInput').value.trim();
            if(!imei || !service.value) return alert("Error: Information Incomplete");

            db.collection("orders").add({
                service_name: service.options[service.selectedIndex].text,
                service_price: service.value,
                imei: imei,
                status: "Pending",
                date: new Date().toLocaleString()
            }).then(() => {
                window.location.href = "checkout.html";
            });
        }
    </script>
</body>
</html>
