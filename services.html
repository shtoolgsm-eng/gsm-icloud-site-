<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VIP Services | iRemove Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #030508; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        select { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-black font-orbitron italic blue-glow uppercase">Service Selection</h2>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.4em] mt-4">Premium Security & Forensic Solutions</p>
        </div>

        <div class="glass-card p-10 rounded-[2.5rem]">
            <div class="grid grid-cols-1 gap-10">
                <div>
                    <label class="block text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest">Premium Catalog</label>
                    <select id="serviceSelect" class="w-full p-6 bg-black border border-gray-800 rounded-2xl text-sm font-semibold focus:border-blue-500 outline-none transition">
                        <option value="" disabled selected>-- CHOOSE SERVICE --</option>
                        <optgroup label="⚡ BYPASS SPECIAL (LIMITED)">
                            <option value="10">iCloud Bypass (All Models - No Network) - $10</option>
                            <option value="13">iCloud Bypass (6 to 17PM) - $13</option>
                        </optgroup>
                        <optgroup label="📱 IPHONE OFFICIAL UNLOCK">
                            <option value="25">iPhone 6 / 6S Series - $25</option>
                            <option value="30">iPhone SE / 7 / 7 Plus - $30</option>
                            <option value="35">iPhone 8 / 8 Plus / X - $35</option>
                            <option value="40">iPhone XR / XS - $40</option>
                            <option value="45">iPhone XS Max / 11 - $45</option>
                            <option value="55">iPhone 11 Pro - $55</option>
                            <option value="75">iPhone 11 Pro Max - $75</option>
                            <option value="90">iPhone 12 / 12 mini - $90</option>
                            <option value="95">iPhone 12 Pro - $95</option>
                            <option value="100">iPhone 12 Pro Max - $100</option>
                            <option value="115">iPhone 13 / 13 mini - $115</option>
                            <option value="135">iPhone 13 Pro - $135</option>
                            <option value="150">iPhone 13 Pro Max - $150</option>
                            <option value="160">iPhone 14 / 14 Plus - $160</option>
                            <option value="165">iPhone 14 Pro / 15 - $165</option>
                            <option value="175">iPhone 14 Pro Max / 15 Plus - $175</option>
                            <option value="180">iPhone 15 Pro - $180</option>
                            <option value="190">iPhone 15 Pro Max / 16 - $190</option>
                            <option value="195">iPhone 16 Plus / 17 Series - $195</option>
                            <option value="205">iPhone 16 Pro Max - $205</option>
                            <option value="210">iPhone 17 Pro Max - $210</option>
                        </optgroup>
                        <optgroup label="💻 IPAD SERIES">
                            <option value="50">iPad 8 - $50</option>
                            <option value="55">iPad 9 - $55</option>
                            <option value="65">iPad 10 - $65</option>
                            <option value="140">iPad Pro 11 (Gen 1-4) - $140</option>
                            <option value="150">iPad Pro 12.9 (Gen 1-6) - $150</option>
                        </optgroup>
                        <optgroup label="⌚ APPLE WATCH">
                            <option value="60">Series 4 - $60</option>
                            <option value="85">Series 10 / 11 - $85</option>
                            <option value="120">Ultra 1 / 2 / 3 - $120</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest">IMEI / Serial Number</label>
                    <input type="text" id="imeiInput" placeholder="ENTER 15 DIGITS" class="w-full p-6 bg-black border border-gray-800 rounded-2xl text-sm font-mono focus:border-blue-500 outline-none uppercase tracking-widest">
                </div>
            </div>

            <button onclick="submitOrder()" class="w-full mt-12 py-6 bg-blue-600 rounded-2xl font-black font-orbitron uppercase tracking-widest shadow-xl shadow-blue-500/20 hover:bg-blue-500 transition">Place VIP Order</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { projectId: "gsm-icloud-site", appId: "1:722465166110:web:2924065072d54e3cf06f0f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function submitOrder() {
            const service = document.getElementById('serviceSelect').value;
            const imei = document.getElementById('imeiInput').value.trim();
            if(!imei || !service) return alert("Please complete selection and enter IMEI");

            db.collection("orders").add({
                service_price: service,
                imei: imei,
                status: "Pending",
                date: new Date().toLocaleString()
            }).then(() => {
                window.location.href = "checkout.html";
            });
        }
    </script>
</body>
</html>
